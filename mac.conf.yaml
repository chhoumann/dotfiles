- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    # Karabiner
    ~/.config/karabiner/karabiner.json:
      path: ./config/karabiner/karabiner.json
      create: true
      force: true
    ~/.config/karabiner/assets:
      path: ./config/karabiner/assets
      create: true
      force: true
