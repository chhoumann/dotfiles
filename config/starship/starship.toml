# GitHub Dark palette.
#
# Identity (where / what / state) lives on the left.
# Execution (how long / did it work) lives on the right.
# Context modules (language versions, direnv, k8s) appear only when relevant.

add_newline = true
command_timeout = 1000
scan_timeout = 30

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$fill\
$python\
$nodejs\
$bun\
$rust\
$golang\
$java\
$direnv\
$status\
$cmd_duration\
$jobs\
$line_break\
$character"""

right_format = ""

[fill]
symbol = " "
style = ""

# ---------- IDENTITY ----------

[username]
show_always = false
style_user = "#39c5cf"
style_root = "#ff7b72 bold"
format = "[$user]($style)[@](fg:#6e7681)"

[hostname]
ssh_only = true
style = "#39c5cf"
format = "[$hostname]($style)[:](fg:#6e7681) "

# Anchor the path on the repo root: dim the parent path, bold-highlight the
# repo name, dim the path inside it. So you always see the boundary.
[directory]
style = "#6e7681"
format = "[$path]($style)[$read_only]($read_only_style) "
repo_root_format = "[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "
repo_root_style = "bold #58a6ff"
before_repo_root_style = "#6e7681"
truncation_length = 4
truncate_to_repo = false
truncation_symbol = "…/"
read_only = "  "
read_only_style = "#d29922"
home_symbol = "~"

# ---------- GIT ----------

[git_branch]
symbol = " "
format = "[$symbol$branch(:$remote_branch)]($style) "
style = "#bc8cff"
truncation_length = 24
truncation_symbol = "…"

[git_state]
format = '[$state( $progress_current/$progress_total)]($style) '
style = "bold #ff7b72"
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"

# Each git state symbol is colored independently so the eye picks up the
# *actionable* states (conflicts, behind) faster than the merely informational
# ones (untracked).
[git_status]
format = '([$conflicted](bold #ff7b72) )([$deleted](#ff7b72) )([$staged](#3fb950) )([$modified](#d29922) )([$renamed](#58a6ff) )([$untracked](#6e7681) )([$stashed](#bc8cff) )([$ahead_behind]($ahead_behind_style) )'
conflicted = "‼${count}"
deleted = "✘${count}"
staged = "+${count}"
modified = "●${count}"
renamed = "→${count}"
untracked = "○${count}"
stashed = "≡${count}"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
style = ""  # per-state styles handled via format above

# ---------- CONTEXT (right-aligned) ----------

[python]
symbol = " "
format = '[$symbol${pyenv_prefix}${version}( \($virtualenv\))]($style) '
style = "#8b949e"
detect_extensions = []
detect_files = ["pyproject.toml", "requirements.txt", ".python-version", "Pipfile", "tox.ini", "setup.py", "uv.lock"]

[nodejs]
symbol = " "
format = "[$symbol$version]($style) "
style = "#8b949e"
detect_extensions = []
detect_files = ["package.json", ".nvmrc", ".node-version"]

[bun]
symbol = " "
format = "[$symbol$version]($style) "
style = "#8b949e"
detect_files = ["bun.lockb", "bun.lock", "bunfig.toml"]

[rust]
symbol = " "
format = "[$symbol$version]($style) "
style = "#8b949e"
detect_extensions = []
detect_files = ["Cargo.toml"]

[golang]
symbol = " "
format = "[$symbol$version]($style) "
style = "#8b949e"
detect_extensions = []
detect_files = ["go.mod", "go.sum"]

[java]
symbol = " "
format = "[$symbol$version]($style) "
style = "#8b949e"
detect_extensions = []
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts"]

[direnv]
disabled = false
format = "[$symbol$loaded/$allowed]($style) "
symbol = "▼ "
style = "#8b949e"
loaded_msg = "on"
allowed_msg = "ok"
not_allowed_msg = "blocked"
denied_msg = "denied"
unloaded_msg = "off"

# ---------- EXECUTION ----------

[cmd_duration]
min_time = 2000
format = "[ $duration]($style) "
style = "#6e7681"

# Show exit code (and signal name where relevant — SIGKILL=137, SIGTERM=143, etc.)
# only when nonzero. Recognized signals get a readable label.
[status]
disabled = false
format = '[$symbol$common_meaning$signal_name$maybe_int]($style) '
symbol = "✗ "
not_executable_symbol = "⊘ "
not_found_symbol = "? "
sigint_symbol = "⎋ "
signal_symbol = "⚡ "
style = "#ff7b72"
recognize_signal_code = true
map_symbol = true

[jobs]
symbol = "⚙ "
style = "#d29922"
number_threshold = 1
symbol_threshold = 1
format = "[$symbol$number]($style) "

# ---------- PROMPT CHARACTER ----------

# Insert mode = blue ❯, vim normal mode = purple ❮ (different shape, not just
# color — easier in peripheral vision and color-blind-safe). Red ❯ on a
# failed previous command.
[character]
success_symbol = "[❯](bold #58a6ff)"
error_symbol = "[❯](bold #ff7b72)"
vicmd_symbol = "[❮](bold #bc8cff)"

# ---------- DISABLED (kept here so you know they exist) ----------

[time]
disabled = true

[battery]
disabled = true

[aws]
disabled = true

[kubernetes]
disabled = true

[docker_context]
disabled = true
